[build]
builder = "RAILPACK"
buildCommand = "composer install --no-dev --optimize-autoloader --no-interaction && npm ci && npm run build"

[deploy]
preDeployCommand = "php artisan migrate --force"
startCommand = "php artisan storage:link || true && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
